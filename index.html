<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAY Planner ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --emerald: #1a6b4a;
    --emerald-mid: #2d8c62;
    --emerald-bright: #3aaf7a;
    --pastel-green: #b8f0d0;
    --pastel-soft: #d8f7e8;
    --pastel-lightest: #edfaf3;
    --cream: #f8fdf9;
    --dark: #0f2e1f;
    --text: #1c3d2a;
    --muted: #5a8a6e;
    --card-bg: rgba(255,255,255,0.75);
    --shadow: 0 8px 32px rgba(26,107,74,0.12);
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background mesh ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(184,240,208,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 90% 80%, rgba(58,175,122,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 60% 10%, rgba(216,247,232,0.7) 0%, transparent 60%),
      var(--cream);
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 40px 16px;
    backdrop-filter: blur(10px);
    background: rgba(248,253,249,0.6);
    border-bottom: 1px solid rgba(184,240,208,0.5);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--emerald-bright), var(--emerald));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; box-shadow: 0 4px 12px rgba(26,107,74,0.3);
  }
  .logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 24px; color: var(--emerald);
    letter-spacing: -0.5px;
  }
  .header-right {
    display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
  }
  .header-date {
    font-size: 14px; color: var(--muted); font-weight: 500;
    background: var(--pastel-soft);
    padding: 8px 16px; border-radius: 50px;
    border: 1px solid var(--pastel-green);
  }
  .quote-box {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, rgba(184,240,208,0.55), rgba(216,247,232,0.7));
    border: 1px solid rgba(184,240,208,0.8);
    border-radius: 50px;
    padding: 8px 18px;
    max-width: 380px;
    animation: quoteFade 1s ease;
  }
  @keyframes quoteFade {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .quote-hearts { font-size: 14px; flex-shrink: 0; letter-spacing: -2px; }
  .quote-text {
    font-size: 12.5px; color: var(--emerald); font-weight: 500;
    font-style: italic; line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  @media (max-width: 900px) {
    .quote-box { max-width: 220px; }
    .quote-text { font-size: 11px; }
  }

  /* ── Layout ── */
  .main-grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    grid-template-rows: auto auto;
    gap: 24px;
    padding: 28px 40px 40px;
    max-width: 1400px; margin: 0 auto;
  }

  /* ── Cards ── */
  .card {
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    border-radius: var(--radius);
    border: 1px solid rgba(184,240,208,0.6);
    box-shadow: var(--shadow);
    padding: 24px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(26,107,74,0.16); }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px; color: var(--emerald);
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title span { font-size: 20px; }

  /* ── Daily Task Bar ── */
  #daily-card { grid-column: 1; grid-row: 1; }

  .day-progress-wrap { margin-bottom: 20px; }
  .day-prog-label {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500;
  }
  .day-prog-label strong { color: var(--emerald); font-size: 15px; }
  .progress-bar-bg {
    height: 12px; border-radius: 100px;
    background: var(--pastel-green);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 100px;
    background: linear-gradient(90deg, var(--emerald-bright), var(--emerald));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 2px 8px rgba(58,175,122,0.4);
  }

  /* add task */
  .add-task-row {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
  }
  .add-task-row input {
    flex: 1; min-width: 0; padding: 11px 16px;
    border: 1.5px solid var(--pastel-green);
    border-radius: 50px;
    background: var(--pastel-lightest);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .add-task-row input:focus {
    border-color: var(--emerald-bright);
    box-shadow: 0 0 0 3px rgba(58,175,122,0.15);
  }
  .add-task-row input::placeholder { color: var(--muted); }

  .category-select {
    padding: 11px 14px;
    border: 1.5px solid var(--pastel-green);
    border-radius: 50px;
    background: var(--pastel-lightest);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text); outline: none; cursor: pointer;
    transition: border-color 0.2s;
  }
  .category-select:focus { border-color: var(--emerald-bright); }

  .btn-add {
    width: 100%;
    padding: 12px 20px; border-radius: 50px;
    background: linear-gradient(135deg, var(--emerald-bright), var(--emerald));
    color: #fff; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px;
    box-shadow: 0 4px 12px rgba(26,107,74,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-add:hover { transform: scale(1.02); box-shadow: 0 6px 18px rgba(26,107,74,0.4); }
  .btn-add:active { transform: scale(0.97); }

  /* checklist */
  .checklist { display: flex; flex-direction: column; gap: 9px; max-height: 340px; overflow-y: auto; }
  .checklist::-webkit-scrollbar { width: 5px; }
  .checklist::-webkit-scrollbar-track { background: transparent; }
  .checklist::-webkit-scrollbar-thumb { background: var(--pastel-green); border-radius: 10px; }

  .task-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; border-radius: 14px;
    background: var(--pastel-lightest);
    border: 1.5px solid transparent;
    cursor: pointer; transition: all 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .task-item:hover { border-color: var(--pastel-green); background: #fff; }
  .task-item.done { opacity: 0.6; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--emerald-bright);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; background: transparent;
  }
  .task-item.done .task-check {
    background: linear-gradient(135deg, var(--emerald-bright), var(--emerald));
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(58,175,122,0.4);
  }
  .task-check svg { display: none; }
  .task-item.done .task-check svg { display: block; }

  .task-text { font-size: 14px; font-weight: 500; flex: 1; }

  .task-cat-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 50px; letter-spacing: 0.3px; flex-shrink: 0;
  }

  .task-delete {
    width: 24px; height: 24px; border-radius: 50%;
    border: none; background: transparent; cursor: pointer;
    color: var(--muted); font-size: 16px; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s, background 0.2s;
  }
  .task-item:hover .task-delete { opacity: 1; }
  .task-delete:hover { background: #fde8e8; color: #c0392b; }

  /* category colors */
  .cat-study    { background: #dbeafe; color: #1d4ed8; }
  .cat-health   { background: #fce7f3; color: #be185d; }
  .cat-hobby    { background: #fef3c7; color: #b45309; }
  .cat-personal { background: #ede9fe; color: #6d28d9; }
  .cat-other    { background: var(--pastel-green); color: var(--emerald); }

  /* ── Calendar ── */
  #calendar-card { grid-column: 2; grid-row: 1 / 3; }

  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .cal-month-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px; color: var(--emerald); font-weight: 700;
  }
  .cal-nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid var(--pastel-green);
    background: var(--pastel-lightest);
    cursor: pointer; font-size: 16px; color: var(--emerald);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .cal-nav-btn:hover { background: var(--pastel-green); box-shadow: 0 2px 8px rgba(26,107,74,0.15); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow {
    text-align: center; font-size: 10px; font-weight: 700;
    color: var(--muted); padding: 4px 0; text-transform: uppercase; letter-spacing: 0.8px;
  }
  .cal-day {
    aspect-ratio: 1; border-radius: 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; position: relative;
    border: 1.5px solid transparent;
    background: var(--pastel-lightest);
  }
  .cal-day:hover { background: var(--pastel-soft); border-color: var(--pastel-green); }
  .cal-day.other-month { opacity: 0.35; cursor: default; }
  .cal-day.today {
    background: linear-gradient(135deg, var(--emerald-bright), var(--emerald));
    color: #fff !important;
    box-shadow: 0 4px 12px rgba(26,107,74,0.35);
  }
  .cal-day.selected { border-color: var(--emerald); background: var(--pastel-soft); }
  .cal-day .dot-wrap { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; max-width: 24px; }
  .cal-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--emerald-bright);
  }
  .cal-day.today .cal-dot { background: rgba(255,255,255,0.8); }
  .cal-day .day-num { line-height: 1; }
  .cal-day .day-prog-mini {
    position: absolute; bottom: 3px;
    width: 60%; height: 3px; border-radius: 100px;
    background: var(--pastel-green); overflow: hidden;
  }
  .cal-day .day-prog-mini-fill {
    height: 100%; border-radius: 100px;
    background: var(--emerald-bright);
    transition: width 0.3s;
  }
  .cal-day.today .day-prog-mini { background: rgba(255,255,255,0.3); }
  .cal-day.today .day-prog-mini-fill { background: rgba(255,255,255,0.9); }

  /* selected day panel */
  .selected-day-info {
    margin-top: 20px; padding: 16px; border-radius: 14px;
    background: var(--pastel-lightest);
    border: 1.5px solid var(--pastel-green);
  }
  .sel-day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .sel-day-title { font-weight: 700; color: var(--emerald); font-size: 15px; }
  .sel-day-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 50px; background: var(--pastel-green); color: var(--emerald);
  }
  .sel-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .sel-add-row input {
    flex: 1; min-width: 0; padding: 9px 14px;
    border: 1.5px solid var(--pastel-green); border-radius: 50px;
    background: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text); outline: none; transition: border-color 0.2s;
  }
  .sel-add-row input:focus { border-color: var(--emerald-bright); }
  .sel-add-row input::placeholder { color: var(--muted); }
  .sel-cat-select {
    padding: 9px 10px; border: 1.5px solid var(--pastel-green); border-radius: 50px;
    background: #fff; font-family: 'DM Sans', sans-serif; font-size: 12px;
    color: var(--text); outline: none; cursor: pointer;
  }
  .sel-add-btn {
    padding: 9px 16px; border-radius: 50px;
    background: linear-gradient(135deg, var(--emerald-bright), var(--emerald));
    color: #fff; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px;
    box-shadow: 0 3px 10px rgba(26,107,74,0.3); transition: transform 0.15s;
    white-space: nowrap;
  }
  .sel-add-btn:hover { transform: scale(1.04); }
  .sel-day-tasks { display: flex; flex-direction: column; gap: 7px; max-height: 140px; overflow-y: auto; }
  .sel-task-chip {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 10px;
    background: #fff; border: 1px solid var(--pastel-green);
  }
  .sel-task-chip.done-chip { opacity: 0.65; text-decoration: line-through; }
  .sel-task-del {
    margin-left: auto; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 15px; line-height: 1; padding: 0 2px;
    transition: color 0.2s;
  }
  .sel-task-del:hover { color: #c0392b; }
  .empty-msg { font-size: 13px; color: var(--muted); font-style: italic; }

  /* ── Analytics ── */
  #analytics-card { grid-column: 1; grid-row: 2; }

  .analytics-tabs {
    display: flex; gap: 6px; margin-bottom: 20px;
  }
  .tab-btn {
    padding: 7px 18px; border-radius: 50px;
    border: 1.5px solid var(--pastel-green);
    background: var(--pastel-lightest);
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--emerald-bright), var(--emerald));
    border-color: transparent; color: #fff;
    box-shadow: 0 3px 10px rgba(26,107,74,0.3);
  }

  .analytics-summary {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px;
  }
  .stat-bubble {
    padding: 12px 10px; border-radius: 16px;
    background: var(--pastel-lightest);
    border: 1px solid var(--pastel-green);
    text-align: center; min-width: 0;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 26px; color: var(--emerald); font-weight: 700; line-height: 1;
  }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }

  .cat-analytics { display: flex; flex-direction: column; gap: 12px; }
  .cat-bar-row { }
  .cat-bar-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .cat-bar-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .cat-bar-pct { font-size: 13px; font-weight: 700; color: var(--emerald); }
  .cat-bar-track { height: 10px; border-radius: 100px; background: var(--pastel-green); overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 100px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

  .no-analytics { font-size: 14px; color: var(--muted); font-style: italic; text-align: center; padding: 20px 0; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; grid-template-rows: auto; padding: 16px; gap: 16px; }
    #calendar-card { grid-column: 1; grid-row: 2; }
    #analytics-card { grid-column: 1; grid-row: 3; }
    header { padding: 16px 20px; }
    .main-grid { padding: 16px 20px; }
  }

  /* toast */
  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: linear-gradient(135deg, var(--emerald-bright), var(--emerald));
    color: #fff; padding: 12px 22px; border-radius: 50px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(26,107,74,0.4);
    transform: translateY(80px); opacity: 0;
    transition: all 0.35s cubic-bezier(.4,0,.2,1);
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* emoji float animation */
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }
  .float-emoji {
    position: fixed; pointer-events: none; font-size: 28px; z-index: 999;
    animation: floatUp 0.9s ease forwards;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <h1>KAY Planner</h1>
  </div>
  <div class="header-right">
    <div class="header-date" id="header-date"></div>
    <div class="quote-box" id="quote-box">
      <span class="quote-hearts">🤍🌿</span>
      <span class="quote-text" id="quote-text"></span>
    </div>
  </div>
</header>

<div class="main-grid">
  <!-- Daily Tasks -->
  <div class="card" id="daily-card">
    <div class="card-title"><span>✦</span> Today's Tasks</div>

    <div class="day-progress-wrap">
      <div class="day-prog-label">
        <span>Daily Progress</span>
        <strong id="prog-pct">0%</strong>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="add-task-row">
      <input type="text" id="task-input" placeholder="Add a new task…" maxlength="60">
      <select class="category-select" id="task-cat">
        <option value="study">📚 Study</option>
        <option value="health">💪 Health</option>
        <option value="hobby">🎨 Hobby</option>
        <option value="personal">💜 Personal</option>
        <option value="other">✦ Other</option>
      </select>
      <button class="btn-add" onclick="addTask()">+ Add Task</button>
    </div>

    <div class="checklist" id="checklist"></div>
  </div>

  <!-- Calendar -->
  <div class="card" id="calendar-card">
    <div class="card-title"><span>🗓</span> Monthly Calendar</div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month-name" id="cal-month-name"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="selected-day-info" id="selected-day-info">
      <div class="sel-day-header">
        <div class="sel-day-title" id="sel-day-title">Select a day to plan tasks</div>
        <div class="sel-day-badge" id="sel-day-badge"></div>
      </div>
      <div class="sel-add-row">
        <input type="text" id="sel-task-input" placeholder="Add task for this day…" maxlength="60">
        <select class="sel-cat-select" id="sel-task-cat">
          <option value="study">📚 Study</option>
          <option value="health">💪 Health</option>
          <option value="hobby">🎨 Hobby</option>
          <option value="personal">💜 Personal</option>
          <option value="other">✦ Other</option>
        </select>
        <button class="sel-add-btn" onclick="addTaskToSelDay()">+ Add</button>
      </div>
      <div class="sel-day-tasks" id="sel-day-tasks"><p class="empty-msg">No tasks on this day.</p></div>
    </div>
  </div>

  <!-- Analytics -->
  <div class="card" id="analytics-card">
    <div class="card-title"><span>📊</span> Analytics</div>
    <div class="analytics-tabs">
      <button class="tab-btn active" onclick="setTab('week',this)">This Week</button>
      <button class="tab-btn" onclick="setTab('month',this)">This Month</button>
    </div>
    <div class="analytics-summary" id="analytics-summary"></div>
    <div class="cat-analytics" id="cat-analytics"><p class="no-analytics">No data yet — start checking off tasks!</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ───────── State ───────── */
const todayDate = new Date();
const todayKey  = fmtKey(todayDate);

let state = loadState();
let calYear  = todayDate.getFullYear();
let calMonth = todayDate.getMonth();
let selKey   = todayKey;
let curTab   = 'week';

const CAT_META = {
  study:    { label: '📚 Study',    cls: 'cat-study',    color: '#3b82f6' },
  health:   { label: '💪 Health',   cls: 'cat-health',   color: '#ec4899' },
  hobby:    { label: '🎨 Hobby',    cls: 'cat-hobby',    color: '#f59e0b' },
  personal: { label: '💜 Personal', cls: 'cat-personal', color: '#8b5cf6' },
  other:    { label: '✦ Other',     cls: 'cat-other',    color: '#2d8c62' },
};

/* ───────── Helpers ───────── */
function fmtKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function loadState() {
  try { return JSON.parse(localStorage.getItem('bloom_planner')) || {}; } catch { return {}; }
}
function saveState() {
  localStorage.setItem('bloom_planner', JSON.stringify(state));
}
function getDay(key) {
  if (!state[key]) state[key] = { tasks: [] };
  return state[key];
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function floatEmoji(emoji, x, y) {
  const el = document.createElement('div');
  el.className = 'float-emoji'; el.textContent = emoji;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

/* ───────── Header Date ───────── */
function renderHeaderDate() {
  const opts = { weekday:'long', month:'long', day:'numeric', year:'numeric' };
  document.getElementById('header-date').textContent = todayDate.toLocaleDateString('en-IN', opts);
}

/* ───────── Daily Checklist ───────── */
function addTask() {
  const inp = document.getElementById('task-input');
  const cat = document.getElementById('task-cat').value;
  const text = inp.value.trim();
  if (!text) { inp.focus(); inp.style.borderColor='var(--emerald-bright)'; setTimeout(()=>inp.style.borderColor='',600); return; }
  const day = getDay(todayKey);
  day.tasks.push({ id: Date.now(), text, cat, done: false });
  saveState(); inp.value = '';
  renderChecklist(); renderCalendar(); renderAnalytics();
  showToast('Task added ✦');
}
document.getElementById('task-input').addEventListener('keydown', e => { if (e.key==='Enter') addTask(); });

function toggleTask(id, event) {
  const day = getDay(todayKey);
  const task = day.tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  saveState();
  renderChecklist(); renderCalendar(); renderAnalytics();
  if (task.done && event) floatEmoji('✅', event.clientX - 14, event.clientY - 40);
}
function deleteTask(id) {
  const day = getDay(todayKey);
  day.tasks = day.tasks.filter(t => t.id !== id);
  saveState(); renderChecklist(); renderCalendar(); renderAnalytics();
}
function renderChecklist() {
  const day = getDay(todayKey);
  const el  = document.getElementById('checklist');
  el.innerHTML = '';
  if (!day.tasks.length) {
    el.innerHTML = '<p style="text-align:center;color:var(--muted);font-size:13px;padding:20px 0;">No tasks yet — add one above 🌿</p>';
    updateProgress(0,0); return;
  }
  day.tasks.forEach(task => {
    const m = CAT_META[task.cat] || CAT_META.other;
    const item = document.createElement('div');
    item.className = 'task-item' + (task.done?' done':'');
    item.innerHTML = `
      <div class="task-check" onclick="toggleTask(${task.id},event)">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5l3 3 7-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="task-text">${escHtml(task.text)}</span>
      <span class="task-cat-badge ${m.cls}">${m.label}</span>
      <button class="task-delete" onclick="deleteTask(${task.id})" title="Delete">×</button>
    `;
    el.appendChild(item);
  });
  const done = day.tasks.filter(t=>t.done).length;
  updateProgress(done, day.tasks.length);
}
function updateProgress(done, total) {
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ───────── Calendar ───────── */
function changeMonth(d) { calMonth += d; if (calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-name').textContent = months[calMonth] + ' ' + calYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    const el = document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
  });
  const first = new Date(calYear, calMonth, 1).getDay();
  const days  = new Date(calYear, calMonth+1, 0).getDate();
  const prevD = new Date(calYear, calMonth, 0).getDate();

  for (let i=0; i<first; i++) {
    const el = document.createElement('div'); el.className='cal-day other-month';
    el.innerHTML = `<span class="day-num">${prevD-first+1+i}</span>`; grid.appendChild(el);
  }
  for (let d=1; d<=days; d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = key===todayKey;
    const isSel   = key===selKey;
    const dayData = state[key];
    const tasks   = dayData?.tasks || [];
    const done    = tasks.filter(t=>t.done).length;
    const pct     = tasks.length ? Math.round((done/tasks.length)*100) : 0;

    const el = document.createElement('div');
    el.className = 'cal-day' + (isToday?' today':'') + (isSel&&!isToday?' selected':'');
    el.innerHTML = `<span class="day-num">${d}</span>
      ${tasks.length?`<div class="day-prog-mini"><div class="day-prog-mini-fill" style="width:${pct}%"></div></div>`:''}`;
    el.onclick = () => selectDay(key, d);
    grid.appendChild(el);
  }
  // fill trailing
  const trailing = 42 - first - days;
  for (let i=1; i<=trailing; i++) {
    const el = document.createElement('div'); el.className='cal-day other-month';
    el.innerHTML = `<span class="day-num">${i}</span>`; grid.appendChild(el);
  }
  renderSelDay();
}
function selectDay(key, d) {
  selKey = key; renderCalendar();
}
function addTaskToSelDay() {
  const inp  = document.getElementById('sel-task-input');
  const cat  = document.getElementById('sel-task-cat').value;
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  const day = getDay(selKey);
  day.tasks.push({ id: Date.now(), text, cat, done: false });
  saveState(); inp.value = '';
  renderCalendar(); renderAnalytics();
  // also refresh today's checklist if selected day is today
  if (selKey === todayKey) renderChecklist();
  showToast('Task planned ✦');
}
document.getElementById('sel-task-input').addEventListener('keydown', e => { if (e.key==='Enter') addTaskToSelDay(); });

function deleteSelTask(key, id) {
  const day = getDay(key);
  day.tasks = day.tasks.filter(t => t.id !== id);
  saveState(); renderCalendar(); renderAnalytics();
  if (key === todayKey) renderChecklist();
}
function renderSelDay() {
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const [y,m,d] = selKey.split('-').map(Number);
  const isToday = selKey === todayKey;
  const isPast  = selKey < todayKey;
  document.getElementById('sel-day-title').textContent = `${d} ${months[m-1]} ${y}`;
  const badge = document.getElementById('sel-day-badge');
  badge.textContent = isToday ? 'Today' : isPast ? 'Past' : 'Upcoming';
  badge.style.background = isToday ? 'linear-gradient(135deg,var(--emerald-bright),var(--emerald))' : '';
  badge.style.color = isToday ? '#fff' : '';

  const tasks = state[selKey]?.tasks || [];
  const wrap  = document.getElementById('sel-day-tasks');
  if (!tasks.length) { wrap.innerHTML = '<p class="empty-msg">No tasks — add one above 🌿</p>'; return; }
  wrap.innerHTML = tasks.map(t => {
    const m2 = CAT_META[t.cat]||CAT_META.other;
    return `<div class="sel-task-chip ${t.done?'done-chip':''}">
      <span class="task-cat-badge ${m2.cls}" style="font-size:10px">${m2.label}</span>
      <span>${escHtml(t.text)}</span>
      <button class="sel-task-del" onclick="deleteSelTask('${selKey}',${t.id})" title="Delete">×</button>
    </div>`;
  }).join('');
}

/* ───────── Analytics ───────── */
function setTab(tab, btn) {
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAnalytics();
}
function renderAnalytics() {
  const now = new Date();
  let keys = [];
  if (curTab==='week') {
    for (let i=6; i>=0; i--) { const d=new Date(now); d.setDate(now.getDate()-i); keys.push(fmtKey(d)); }
  } else {
    const y=now.getFullYear(), m=now.getMonth();
    const days=new Date(y,m+1,0).getDate();
    for (let d=1; d<=days; d++) keys.push(`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }

  // collect all tasks in range
  let totalTasks=0, totalDone=0, activeDays=0;
  const catStats = {}; // cat -> {total, done}
  keys.forEach(k => {
    const tasks = state[k]?.tasks||[];
    if (tasks.length) activeDays++;
    tasks.forEach(t => {
      totalTasks++;
      if (t.done) totalDone++;
      if (!catStats[t.cat]) catStats[t.cat]={total:0,done:0};
      catStats[t.cat].total++;
      if (t.done) catStats[t.cat].done++;
    });
  });

  const overallPct = totalTasks ? Math.round((totalDone/totalTasks)*100) : 0;

  // summary bubbles
  document.getElementById('analytics-summary').innerHTML = `
    <div class="stat-bubble"><div class="stat-num">${totalTasks}</div><div class="stat-label">Total Tasks</div></div>
    <div class="stat-bubble"><div class="stat-num">${totalDone}</div><div class="stat-label">Completed</div></div>
    <div class="stat-bubble"><div class="stat-num">${overallPct}%</div><div class="stat-label">Success Rate</div></div>
    <div class="stat-bubble"><div class="stat-num">${activeDays}</div><div class="stat-label">Active Days</div></div>
  `;

  const wrap = document.getElementById('cat-analytics');
  const entries = Object.entries(catStats).sort((a,b)=>b[1].total-a[1].total);
  if (!entries.length) {
    wrap.innerHTML='<p class="no-analytics">No data yet — start checking off tasks!</p>'; return;
  }
  wrap.innerHTML = entries.map(([cat, s]) => {
    const m = CAT_META[cat]||CAT_META.other;
    const pct = Math.round((s.done/s.total)*100);
    return `<div class="cat-bar-row">
      <div class="cat-bar-info">
        <span class="cat-bar-name">
          <span class="task-cat-badge ${m.cls}">${m.label}</span>
          <span style="font-size:12px;color:var(--muted)">${s.done}/${s.total} completed</span>
        </span>
        <span class="cat-bar-pct">${pct}%</span>
      </div>
      <div class="cat-bar-track">
        <div class="cat-bar-fill" style="width:${pct}%;background:${m.color}"></div>
      </div>
    </div>`;
  }).join('');
}
